<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BHAI AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
overflow:hidden;
color:white;
}

.box{

width:370px;
height:650px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.1);

border-radius:25px;

padding:20px;

box-shadow:
0 0 20px rgba(255,0,150,0.3),
0 0 50px rgba(0,200,255,0.2);

display:flex;
flex-direction:column;

animation:float 4s ease-in-out infinite;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

h1{
text-align:center;
font-size:32px;
color:#ff4d6d;
margin-bottom:15px;
text-shadow:0 0 10px #ff4d6d;
}

#chat{

flex:1;

background:rgba(0,0,0,0.3);

border-radius:20px;

padding:15px;

overflow-y:auto;

display:flex;
flex-direction:column;

gap:10px;
}

.user{

align-self:flex-end;

background:#2563eb;

padding:12px;

border-radius:15px;

max-width:80%;
}

.ai{

align-self:flex-start;

background:#ff3b6b;

padding:12px;

border-radius:15px;

max-width:80%;
}

.input-area{

display:flex;

margin-top:15px;

gap:10px;
}

input{

flex:1;

padding:15px;

border:none;

outline:none;

border-radius:50px;

background:rgba(255,255,255,0.1);

color:white;

font-size:16px;
}

button{

width:60px;

border:none;

border-radius:50%;

background:#ff0055;

color:white;

font-size:24px;

cursor:pointer;

box-shadow:0 0 15px #ff0055;

transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.footer{

text-align:center;

margin-top:10px;

font-size:12px;

opacity:0.7;
}

</style>
</head>

<body>

<div class="box">

<h1>🤖 BHAI AI</h1>

<div id="chat">

<div class="ai">
Namaste Bhai 👋<br>
Main tera AI Assistant hoon 🚀
</div>

</div>

<div class="input-area">

<input type="text" id="msg" placeholder="Kuch bhi pucho...">

<button onclick="send()">
➤
</button>

</div>

<div class="footer">
⚡ Powered By Tushar AI
</div>

</div>

<script>

function send(){

let input = document.getElementById("msg");

let text = input.value;

if(text.trim() === "") return;

let chat = document.getElementById("chat");


// USER MESSAGE

chat.innerHTML += `
<div class="user">
${text}
</div>
`;


// AI REPLY

let reply = "Samajh gaya bhai 😎";


if(text.toLowerCase().includes("hello") ||
text.toLowerCase().includes("hi")){

reply = "Hello Bhai 👋";
}

else if(text.toLowerCase().includes("python")){

reply = "Python ek powerful programming language hai 🔥";
}

else if(text.toLowerCase().includes("html")){

reply = "HTML website ka structure banata hai 🌐";
}

else if(text.toLowerCase().includes("css")){

reply = "CSS website ko stylish banata hai 🎨";
}

else if(text.toLowerCase().includes("javascript")){

reply = "JavaScript website ko smart banata hai ⚡";
}

else if(text.toLowerCase().includes("api")){

reply = "API systems ko connect karti hai 🔗";
}

else if(text.toLowerCase().includes("ai")){

reply = "AI future hai bhai 🚀";
}

else if(text.toLowerCase().includes("weather")){

reply = "Weather API connect karenge to live weather aayega ☁️";
}

else if(text.toLowerCase().includes("time")){

reply = new Date().toLocaleTimeString();
}

else{

reply = "Mujhe aur sikhaya ja raha hai 😎";
}


// AI MESSAGE

setTimeout(()=>{

chat.innerHTML += `
<div class="ai">
${reply}
</div>
`;

chat.scrollTop = chat.scrollHeight;

},500);


input.value="";

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
