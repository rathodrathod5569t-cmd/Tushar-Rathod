<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BHAI AI</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
font-family:Arial;
overflow:hidden;
}

.bg{
position:absolute;
width:350px;
height:350px;
background:gold;
filter:blur(120px);
opacity:0.3;
transform:rotate(35deg);
}

.container{
position:relative;
width:350px;
height:600px;
background:#111827;
border-radius:25px;
padding:15px;
display:flex;
flex-direction:column;
box-shadow:0 0 40px gold;
z-index:2;
}

h1{
text-align:center;
color:gold;
margin:10px 0;
}

#chat{
flex:1;
background:#020617;
border-radius:20px;
padding:10px;
overflow-y:auto;
}

.message{
padding:10px;
margin:10px 0;
border-radius:15px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#2563eb;
margin-left:auto;
color:white;
}

.ai{
background:#ff2d75;
color:white;
}

.input-area{
display:flex;
margin-top:10px;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
background:#1e293b;
color:white;
outline:none;
}

button{
width:60px;
border:none;
border-radius:20px;
background:gold;
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1>🤖 BHAI AI</h1>

<div id="chat">

<div class="message ai">
Namaste Bhai 👋<br>
Main tera AI Assistant hoon 😎
</div>

</div>

<div class="input-area">

<input
type="text"
id="msg"
placeholder="Kuch bhi pucho..."
>

<button onclick="sendMessage()">➤</button>

</div>

</div>

<script>

const API_KEY = "AIzaSyAgggyoJixUHaVudPEy-XB6cGZJ2xO0Dkk";

async function sendMessage(){

let input = document.getElementById("msg");

let text = input.value.trim();

if(text === "") return;

let chat = document.getElementById("chat");

chat.innerHTML += `
<div class="message user">${text}</div>
`;

input.value = "";

chat.innerHTML += `
<div class="message ai" id="loading">
Typing...
</div>
`;

chat.scrollTop = chat.scrollHeight;

try{

let response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:text
}
]
}
]
})
}
);

let data = await response.json();

document.getElementById("loading").remove();

let reply =
data.candidates[0].content.parts[0].text;

chat.innerHTML += `
<div class="message ai">${reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

}
catch(error){

document.getElementById("loading").remove();

chat.innerHTML += `
<div class="message ai">
Error aaya 😅
</div>
`;

console.log(error);

}

}

document.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
