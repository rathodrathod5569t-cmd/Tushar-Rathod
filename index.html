<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHAI AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
overflow:hidden;
color:white;
}

.box{
width:370px;
height:650px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:20px;
box-shadow:
0 0 20px rgba(255,0,150,0.3),
0 0 50px rgba(0,200,255,0.2);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
text-align:center;
color:#ff4d6d;
font-size:30px;
margin-bottom:15px;
text-shadow:0 0 10px #ff4d6d;
}

#chat{
height:470px;
overflow:auto;
padding:15px;
background:rgba(0,0,0,0.3);
border-radius:20px;
margin-bottom:15px;
scrollbar-width:none;
}

.message{
padding:12px;
margin:10px 0;
border-radius:15px;
max-width:85%;
animation:fade .3s ease;
}

.ai{
background:#ff4d6d;
color:white;
border-bottom-left-radius:5px;
}

.user{
background:#2563eb;
margin-left:auto;
border-bottom-right-radius:5px;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:30px;
background:rgba(255,255,255,0.1);
color:white;
font-size:16px;
}

input::placeholder{
color:#ccc;
}

button{
width:55px;
border:none;
border-radius:50%;
background:#ff4d6d;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1744;
}

.footer{
text-align:center;
margin-top:10px;
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<div class="box">

<h1>🤖 BHAI AI</h1>

<div id="chat">

<div class="message ai">
Namaste Bhai 👋<br>
Main tera AI Assistant hoon 🚀
</div>

</div>

<div class="input-area">
<input type="text" id="msg" placeholder="Kuch bhi pucho...">
<button onclick="send()">➤</button>
</div>

<div class="footer">
⚡ Powered By Tushar AI
</div>

</div>

<script>

function send(){

let msg=document.getElementById("msg");
let chat=document.getElementById("chat");

if(msg.value.trim()=="") return;

chat.innerHTML += `
<div class="message user">
${msg.value}
</div>
`;

let userText=msg.value.toLowerCase();

msg.value="";

setTimeout(()=>{

let reply="Samajh nahi aaya bhai 😅";

if(userText.includes("hello") || userText.includes("hi")){
reply="Hello Bhai 👋";
}

else if(userText.includes("name")){
reply="Mera naam BHAI AI hai 🤖";
}

else if(userText.includes("time")){
reply="⏰ " + new Date().toLocaleTimeString();
}

else if(userText.includes("date")){
reply="📅 " + new Date().toLocaleDateString();
}

else if(userText.includes("joke")){
reply="Teacher: Homework kahan hai? 😂 Student: Sir network issue tha!";
}

chat.innerHTML += `
<div class="message ai">
${reply}
</div>
`;

chat.scrollTop=chat.scrollHeight;

},700);

}

</script>

</body>
</html>
