<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BHAI AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#060816;
overflow:hidden;
color:white;
}

body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#ffd70033,transparent);
animation:rotate 10s linear infinite;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.container{
width:350px;
height:600px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:25px;
padding:20px;
display:flex;
flex-direction:column;
box-shadow:0 0 30px #ffd70055;
z-index:1;
}

h1{
text-align:center;
margin-bottom:15px;
color:#ffd700;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
background:#0d1025;
border-radius:15px;
margin-bottom:15px;
}

.message{
padding:10px 15px;
margin:10px 0;
border-radius:15px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#ff2d75;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:30px;
outline:none;
background:#1c2038;
color:white;
}

button{
width:55px;
border:none;
border-radius:50%;
background:#ffd700;
color:black;
font-size:20px;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

<script>

const API_KEY = "AIzaSyAgggyoJixUHaVudPEy-XB6cGZJ2xO0Dkk";

async function sendMessage(){

const input = document.getElementById("msg");

const text = input.value.trim();

if(text === "") return;

const chat = document.getElementById("chat");

chat.innerHTML += `
<div class="message user">${text}</div>
`;

chat.scrollTop = chat.scrollHeight;

input.value = "";

chat.innerHTML += `
<div class="message ai" id="typing">
Typing...
</div>
`;

chat.scrollTop = chat.scrollHeight;

try {

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
contents: [
{
parts: [
{
text: text
}
]
}
]
})
}
);

const data = await response.json();

document.getElementById("typing").remove();

let reply = "Reply nahi mila 😅";

if(
data.candidates &&
data.candidates[0] &&
data.candidates[0].content &&
data.candidates[0].content.parts[0]
){
reply =
data.candidates[0].content.parts[0].text;
}

chat.innerHTML += `
<div class="message ai">${reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

}
catch(error){

document.getElementById("typing").remove();

chat.innerHTML += `
<div class="message ai">
Error aaya bhai 😅
</div>
`;

console.log(error);

}

}

document.getElementById("msg")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
sendMessage();
}

});

</script>
