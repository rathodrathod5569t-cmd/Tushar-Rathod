<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHAI AI</title>

<style>

body{
margin:0;
padding:0;
background:#050816;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:350px;
height:600px;
background:#111827;
border-radius:20px;
padding:15px;
box-shadow:0 0 30px gold;
display:flex;
flex-direction:column;
}

h1{
text-align:center;
color:gold;
}

#chat{
flex:1;
overflow-y:auto;
background:#0b1020;
padding:10px;
border-radius:15px;
margin-bottom:10px;
}

.message{
padding:10px;
margin:10px 0;
border-radius:12px;
max-width:80%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#ff2d75;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
background:#1e293b;
color:white;
outline:none;
}

button{
width:60px;
border:none;
border-radius:20px;
background:gold;
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 BHAI AI</h1>

<div id="chat">

<div class="message ai">
Namaste Bhai 👋
</div>

</div>

<div class="input-area">

<input type="text" id="msg" placeholder="Kuch bhi pucho...">

<button onclick="sendMessage()">➤</button>

</div>

</div>

<script>

const API_KEY = "AIzaSyAgggyoJixUHaVudPEy-XB6cGZJ2xO0Dkk";

async function sendMessage(){

let input = document.getElementById("msg");

let text = input.value.trim();

if(text === "") return;

let chat = document.getElementById("chat");

chat.innerHTML += `
<div class="message user">${text}</div>
`;

input.value = "";

chat.innerHTML += `
<div class="message ai" id="loading">
Typing...
</div>
`;

chat.scrollTop = chat.scrollHeight;

try{

let response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:text
}
]
}
]
})
}
);

let data = await response.json();

document.getElementById("loading").remove();

let reply =
data.candidates[0].content.parts[0].text;

chat.innerHTML += `
<div class="message ai">${reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

}
catch(error){

document.getElementById("loading").remove();

chat.innerHTML += `
<div class="message ai">
Error aaya 😅
</div>
`;

console.log(error);

}

}

document.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
