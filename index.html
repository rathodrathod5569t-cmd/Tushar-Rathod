<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BHAI AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#060816;
overflow:hidden;
color:white;
}

body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#ffd70033,transparent);
animation:rotate 10s linear infinite;
}

@keyframes rotate{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.container{
width:350px;
height:600px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:25px;
padding:20px;
display:flex;
flex-direction:column;
box-shadow:0 0 30px #ffd70055;
z-index:1;
}

h1{
text-align:center;
margin-bottom:15px;
color:#ffd700;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
background:#0d1025;
border-radius:15px;
margin-bottom:15px;
}

.message{
padding:10px 15px;
margin:10px 0;
border-radius:15px;
max-width:80%;
word-wrap:break-word;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#ff2d75;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:30px;
outline:none;
background:#1c2038;
color:white;
}

button{
width:55px;
border:none;
border-radius:50%;
background:#ffd700;
color:black;
font-size:20px;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 BHAI AI</h1>

<div id="chat">

<div class="message ai">
Namaste Bhai 👋<br>
Main tera AI Assistant hoon 😎
</div>

</div>

<div class="input-area">

<input type="text" id="msg" placeholder="Kuch bhi pucho...">

<button onclick="sendMessage()">➤</button>

</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("msg");

let text = input.value.trim();

if(text==="") return;

let chat = document.getElementById("chat");

chat.innerHTML += `
<div class="message user">${text}</div>
`;

let reply = "Samajh nahi aaya bhai 😅";

let t = text.toLowerCase();

if(t.includes("hello") || t.includes("hi")){
reply = "Hello Bhai 👋 Kaise ho?";
}

else if(t.includes("kaise ho")){
reply = "Main mast hoon bhai 😎";
}

else if(t.includes("python")){
reply = "Python ek powerful coding language hai 🐍";
}

else if(t.includes("html")){
reply = "HTML website banane ke kaam aata hai 🌐";
}

else if(t.includes("css")){
reply = "CSS website ko stylish banata hai 🎨";
}

else if(t.includes("javascript")){
reply = "JavaScript website ko smart banata hai ⚡";
}

else if(t.includes("bye")){
reply = "Bye Bhai 👋";
}

setTimeout(()=>{

chat.innerHTML += `
<div class="message ai">${reply}</div>
`;

chat.scrollTop = chat.scrollHeight;

},500);

input.value="";

}

document.getElementById("msg")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
